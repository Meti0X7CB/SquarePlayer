[Metadata]
Name = SquarePlayer - Blank
Author = Meti0X7CB
Information = "A sleek set of player widget for Win 11 to control all your media"
Version = 3.5
License = GNU General Public License v3.0

[RainMeter]
Update = 30
AccurateText = 1
OnRefreshAction = [!SetVariable Scale "[AppBar:MonitorScale()]"]

[Variables]
Scale = [AppBar:MonitorScale()]
Color = 222,222,222
SubColor = 170,170,170
Highlight = [WindowsAccentColor]
FrostLevel = Acrylic
Theme = Dark4
CornerType = RoundSmall 
PlayerId = "Active"

[WindowsAccentColor]
Measure = Plugin
Plugin = SysColor
ColorType = Accent

[AppBar]
Measure = Plugin
Plugin = AppBar
RequiredSpace = 0
DPIAware = 1
DynamicVariables = 1

[MeasureWindowsTheme]
Measure = Registry
RegHKey = HKEY_CURRENT_USER
RegKey = Software\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize
RegValue = AppsUseLightTheme
IfCondition = MeasureWindowsTheme = 1
IfConditionMode = 1
IfTrueAction = [!SetVariable Theme "Light4"][!SetVariable Color "28,28,28"][!SetVariable SubColor "105,105,105"]
IfFalseAction = [!SetVariable Theme "Dark4"][!SetVariable Color "222,222,222"][!SetVariable SubColor "170,170,170"]
OnChangeAction = [!Refresh]
DynamicVariables = 1

[MeasureWindowsScaling]
Measure = Calc
Formula = [AppBar:MonitorScale()]
OnChangeAction = [!SetVariable Scale "[AppBar:MonitorScale()]"][!Refresh]
DynamicVariables = 1
UpdateDivider = 10

[MeasureStatus]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Status
PlayerId = #PlayerId#
IfCondition = MeasureStatus = 1
IfTrueAction = [!ShowMeterGroup "Active"][!ShowFade]
IfFalseAction = [!HideMeterGroup "Active"][!HideFade]

[MeasureCover]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Cover
PlayerId = #PlayerId#
DefaultPath = #@#Default.png
DynamicVariables = 1

[FrostedGlass]
Measure = Plugin
Plugin = FrostedGlass
Type = #FrostLevel#
Border = None
Corner = #CornerType#
Backdrop = #Theme#
BorderVisible = 0
DynamicVariables = 1

[MeterCanvas]
Meter = Shape
Shape = Rectangle 0,0,(375*#Scale#),(90*#Scale#),5 | Fill Color 0,0,0,0 | StrokeWidth 0
DynamicVariables = 1

[MeterCoverContainer]
Meter = Shape
Shape = Rectangle 0,0,(80*#Scale#),(80*#Scale#),5 | Fill Color 0,0,0,255 | StrokeWidth 0
X = ([MeterRepeat:X])+(40*#Scale#)
Y = ((90*#Scale#)-(80*#Scale#))/2
DynamicVariables = 1

[MeterCover]
Meter = Image
MeasureName = MeasureCover
H = (80*#Scale#)
W = (80*#Scale#)
Container = MeterCoverContainer
PreserveAspectRatio = 2
DynamicVariables = 1
Group = Active

[MeasureTitle]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Title
PlayerId = #PlayerId#
DynamicVariables = 1
Substitute = "0":""

[MeterTitle]
Meter = String
MeasureName = MeasureTitle
X = ([MeterCoverContainer:X])+(95*#Scale#)
Y = (20*#Scale#)
W = (100*#Scale#)
FontColor = #Color#
FontSize = (10*#Scale#)
FontFace = Segoe UI
FontWeight = 500 
AntiAlias = 1
ClipString = 1
StringAlign = LeftTop
DynamicVariables = 1
Group = Active

[MeasureArtist]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Artist
PlayerId = #PlayerId#
DynamicVariables = 1
Substitute = "0":""

[MeterArtist]
Meter = String
MeasureName = MeasureArtist
X = ([MeterCoverContainer:X])+(95*#Scale#)
Y = (50*#Scale#)
W = (100*#Scale#)
FontColor = #SubColor#
FontSize = (10*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
ClipString = 1
StringAlign = LeftTop
DynamicVariables = 1
Group = Active

[MeasurePlayPause]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = State
PlayerId = #PlayerId#
Substitute = "0":"Play","1":"Pause","2":"Play","3":"Replay"
DynamicVariables = 1

[MeterPlayPause]
Meter = Image
ImageName = #@#[MeasurePlayPause].png
X = ([MeterPrev:X])+(30*#Scale#)
Y = (33*#Scale#)
W = (16*#Scale#)
H = (16*#Scale#)
AntiAlias = 1
DynamicVariables = 1
ImageTint = #Color#
LeftMouseDownAction = [!CommandMeasure MeasurePlayPause "PlayPause"][!SetOption MeterPlayPause ImageTint "#*Highlight*#"]
LeftMouseUpAction = [!SetOption MeterPlayPause ImageTint "#*Color*#"]
MouseOverAction = [!SetOption MeterPlayPause ImageAlpha "127"]
MouseLeaveAction = [!SetOption MeterPlayPause ImageAlpha "255"][!SetOption MeterPlayPause ImageTint "#*Color*#"]
Group = Active

[MeterPrev]
Meter = Image
ImageName = #@#Previous.png
X = ([MeterShuffle:X])+(30*#Scale#)
Y = (33*#Scale#)
W = (16*#Scale#)
H = (16*#Scale#)
AntiAlias = 1
ImageTint = #Color#
LeftMouseDownAction = [!CommandMeasure MeasurePlayPause "Previous"][!SetOption MeterPrev ImageTint "#*Highlight*#"]
LeftMouseUpAction = [!SetOption MeterPrev ImageTint "#*Color*#"]
MouseOverAction = [!SetOption MeterPrev ImageAlpha "127"]
MouseLeaveAction = [!SetOption MeterPrev ImageAlpha "255"][!SetOption MeterPrev ImageTint "#*Color*#"]
DynamicVariables = 1
Group = Active

[MeterNext]
Meter = Image
ImageName = #@#Next.png
X = ([MeterPlayPause:X])+(30*#Scale#)
Y = (33*#Scale#)
W = (16*#Scale#)
H = (16*#Scale#)
AntiAlias = 1
ImageTint = #Color#
LeftMouseDownAction = [!CommandMeasure MeasurePlayPause "Next"][!SetOption MeterNext ImageTint "#*Highlight*#"]
LeftMouseUpAction = [!SetOption MeterNext ImageTint "#*Color*#"]
MouseOverAction = [!SetOption MeterNext ImageAlpha "127"]
MouseLeaveAction = [!SetOption MeterNext ImageAlpha "255"][!SetOption MeterNext ImageTint "#*Color*#"]
DynamicVariables = 1
Group = Active

[MeasureRepeat]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Repeat
PlayerId = #PlayerId#
IfCondition = MeasureRepeat = 0
IfTrueAction = [!SetOption MeterRepeat ImageTint "#*Color*#"][!SetOption MeterRepeat ImageName "#@#repeat.png"]
IfCondition2 = MeasureRepeat = 1
IfTrueAction2 = [!SetOption MeterRepeat ImageTint "#*Highlight*#"][!SetOption MeterRepeat ImageName "#@#repeatOne.png"]
IfCondition3 = MeasureRepeat = 2
IfTrueAction3 = [!SetOption MeterRepeat ImageTint "#*Highlight*#"][!SetOption MeterRepeat ImageName "#@#repeat.png"]
DynamicVariables = 1

[MeterRepeat]
Meter = Image
X = ([MeterNext:X])+(30*#Scale#)
Y = (33*#Scale#)
W = (16*#Scale#)
H = (16*#Scale#)
AntiAlias = 1
ImageTint = #Color#
LeftMouseDownAction = [!CommandMeasure MeasurePlayPause "Repeat"]
MouseOverAction = [!SetOption MeterRepeat ImageAlpha "127"]
MouseLeaveAction = [!SetOption MeterRepeat ImageAlpha "255"]
DynamicVariables = 1
Group = Active

[MeasureShuffle]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Shuffle
PlayerId = #PlayerId#
IfCondition = MeasureShuffle = 0
IfTrueAction = [!SetOption MeterShuffle ImageTint "#*Color*#"]
IfCondition2 = MeasureShuffle = 1
IfTrueAction2 = [!SetOption MeterShuffle ImageTint "#*Highlight*#"]
DynamicVariables = 1

[MeterShuffle]
Meter = Image
ImageName = #@#shuffle.png
ImageTint = #Color#
X = (20*#Scale#)
Y = (33*#Scale#)
W = (16*#Scale#)
H = (16*#Scale#)
AntiAlias = 1
LeftMouseUpAction = [!CommandMeasure MeasurePlayPause "Shuffle"]
MouseOverAction = [!SetOption MeterShuffle ImageAlpha "127"]
MouseLeaveAction = [!SetOption MeterShuffle ImageAlpha "255"]
DynamicVariables = 1
Group = Active

[MeasureProgress]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Progress
PlayerId = #PlayerId#
DynamicVariables = 1

[MeasureProgressScaled]
Measure = Calc
Formula = Floor(([MeasureProgress:0]/100) * 220 + 0.5)
DynamicVariables = 1

[MeterProgressContainer]
Meter = Shape
Shape = Rectangle (16*#Scale#),(59*#Scale#),(166.666666666667*#Scale#),(2.666666666667*#Scale#),(1*#Scale#),(1*#Scale#) | Fill Color 185,185,185 | StrokeWidth 0
AntiAlias = 1
DynamicVariables = 1
Group = Active

[MeterProgress]
Meter = Shape
Shape = Rectangle (16*#Scale#),(59*#Scale#),([MeasureProgressScaled:0]*0.666666666667*#Scale#),(2*#Scale#),0,0 | Fill Color #Highlight# | StrokeWidth 0
Shape2 = Rectangle ((25+[MeasureProgressScaled:0])*0.666666666667*#Scale#),(59*#Scale#),((220-([MeasureProgressScaled:0]))*0.666666666667*#Scale#),(2*#Scale#),0,0 | Fill Color 185,185,185 | StrokeWidth 0
Container = MeterProgressContainer
AntiAlias = 1
DynamicVariables = 1
Group = Active

[MeasurePosition]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Position
PlayerId = #PlayerId#
DynamicVariables = 1

[MeterPosition]
Meter = String
X = (22*#Scale#)
Y = (63*#Scale#)
FontColor = #SubColor#
FontSize = (7*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
StringAlign = LeftTop
MeasureName = MeasurePosition
DynamicVariables = 1
Group = Active

[MeasureDuration]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Duration
PlayerId = #PlayerId#
DynamicVariables = 1

[MeterDuration]
Meter = String
X = (153*#Scale#)
Y = (63*#Scale#)
FontColor = #SubColor#
FontSize = (7*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
StringAlign = RightTop
MeasureName = MeasureDuration
DynamicVariables = 1
Group = Active
