[Metadata]
Name = SquarePlayer - Round
Author = Meti0X7CB
Information = "A round player with audio visualizer"
Version = 3.5
License = GNU General Public License v3.0

[RainMeter]
Update = 20
AccurateText = 1
OnRefreshAction = [!SetVariable Scale "[AppBar:MonitorScale()]"]

[Variables]
Scale = [AppBar:MonitorScale()]
Color = 222,222,222
SubColor = 170,170,170
Highlight = [WindowsAccentColor]
FrostLevel = Acrylic
Theme = Dark4
CornerType = RoundSmall 
PlayerId = "Active"
@IncludeAudio = "#@#MeasureBands.inc"

[WindowsAccentColor]
Measure = Plugin
Plugin = SysColor
ColorType = Accent

[AppBar]
Measure = Plugin
Plugin = AppBar
RequiredSpace = 0
DPIAware = 1
DynamicVariables = 1

[MeasureWindowsTheme]
Measure = Registry
RegHKey = HKEY_CURRENT_USER
RegKey = Software\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize
RegValue = AppsUseLightTheme
IfCondition = MeasureWindowsTheme = 1
IfConditionMode = 1
IfTrueAction = [!SetVariable Theme "Light4"][!SetVariable Color "28,28,28"][!SetVariable SubColor "105,105,105"]
IfFalseAction = [!SetVariable Theme "Dark4"][!SetVariable Color "222,222,222"][!SetVariable SubColor "170,170,170"]
OnChangeAction = [!Refresh]
DynamicVariables = 1

[MeasureWindowsScaling]
Measure = Calc
Formula = [AppBar:MonitorScale()]
OnChangeAction = [!SetVariable Scale "[AppBar:MonitorScale()]"][!Refresh]
DynamicVariables = 1
UpdateDivider = 10

[MeasureStatus]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Status
PlayerId = #PlayerId#
IfCondition = MeasureStatus = 1
IfTrueAction = [!HideMeterGroup "Hover"][!ShowFade]
IfFalseAction = [!HideMeterGroup "Hover"][!HideFade]
DynamicVariables = 1

[MeasureCover]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Cover
PlayerId = #PlayerId#
DefaultPath = #@#Default.png
DynamicVariables = 1

[FrostedGlass]
Measure = Plugin
Plugin = FrostedGlass
Type = #FrostLevel#
Border = None
Corner = #CornerType#
Backdrop = #Theme#
BorderVisible = 0
DynamicVariables = 1

[MeterCanvas]
Meter = Shape
Shape = Rectangle 0,0,(200*#Scale#),(200*#Scale#),5 | Fill Color 0,0,0,1 | StrokeWidth 0
DynamicVariables = 1

[BandStyle]
BitMapImage = #@#Bands.png
ImageTint = #Color#
BitMapFrames = 41
BitmapZeroFrame = 1
AntiAlias = 1
@IncludeVisualizer = #@#Visualizer.inc
DynamicVariables = 1

[MeterCover]
Meter = Image
MeasureName = MeasureCover
W = (150*#Scale#)
H = (150*#Scale#)
X = (25*#Scale#)
Y = (25*#Scale#)
MaskImageName = #@#Mask.png
MouseOverAction = [!SetOption MeterCover ImageAlpha "127"][!ShowMeterGroup "Hover"]
MouseLeaveAction = [!SetOption MeterCover ImageAlpha "255"][!HideMeterGroup "Hover"]
DynamicVariables = 1

[MeasurePlayPause]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = State
PlayerId = #PlayerId#
Substitute = "0":"Play","1":"Pause","2":"Play","3":"Replay"
DynamicVariables = 1

[MeterPlayPause]
Meter = Image
ImageName = #@#[MeasurePlayPause].png
X = ((200*#Scale#)-(18*#Scale#))/2
Y = ((200*#Scale#)-(18*#Scale#))/2
W = (18*#Scale#)
H = (18*#Scale#)
AntiAlias = 1
DynamicVariables=1
ImageTint = #Color#
LeftMouseDownAction = [!CommandMeasure MeasurePlayPause "PlayPause"][!SetOption MeterPlayPause ImageTint "#*Highlight*#"]
LeftMouseUpAction = [!SetOption MeterPlayPause ImageTint "#*Color*#"]
MouseOverAction = [!SetOption MeterPlayPause ImageAlpha "127"]
MouseLeaveAction = [!SetOption MeterPlayPause ImageAlpha "255"][!SetOption MeterPlayPause ImageTint "#*Color*#"]
Group = Hover
DynamicVariables = 1

[MeterPrev]
Meter = Image
ImageName = #@#Previous.png
X = ([MeterPlayPause:X])-(25*#Scale#)
Y = ((200*#Scale#)-(18*#Scale#))/2
W = (18*#Scale#)
H = (18*#Scale#)
AntiAlias = 1
ImageTint = #Color#
LeftMouseDownAction = [!CommandMeasure MeasurePlayPause "Previous"][!SetOption MeterPrev ImageTint "#*Highlight*#"]
LeftMouseUpAction = [!SetOption MeterPrev ImageTint "#*Color*#"]
MouseOverAction = [!SetOption MeterPrev ImageAlpha "127"]
MouseLeaveAction = [!SetOption MeterPrev ImageAlpha "255"][!SetOption MeterPrev ImageTint "#*Color*#"]
Group = Hover
DynamicVariables = 1

[MeterNext]
Meter = Image
ImageName = #@#Next.png
X = ([MeterPlayPause:X])+(25*#Scale#)
Y = ((200*#Scale#)-(18*#Scale#))/2
W = (18*#Scale#)
H = (18*#Scale#)
AntiAlias = 1
ImageTint = #Color#
LeftMouseDownAction = [!CommandMeasure MeasurePlayPause "Next"][!SetOption MeterNext ImageTint "#*Highlight*#"]
LeftMouseUpAction = [!SetOption MeterNext ImageTint "#*Color*#"]
MouseOverAction = [!SetOption MeterNext ImageAlpha "127"]
MouseLeaveAction = [!SetOption MeterNext ImageAlpha "255"][!SetOption MeterNext ImageTint "#*Color*#"]
Group = Hover
DynamicVariables = 1

[MeasureRepeat]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Repeat
PlayerId = #PlayerId#
IfCondition = MeasureRepeat = 0
IfTrueAction = [!SetOption MeterRepeat ImageTint "#*Color*#"][!SetOption MeterRepeat ImageName "#@#repeat.png"]
IfCondition2 = MeasureRepeat = 1
IfTrueAction2 = [!SetOption MeterRepeat ImageTint "#*Highlight*#"][!SetOption MeterRepeat ImageName "#@#repeatOne.png"]
IfCondition3 = MeasureRepeat = 2
IfTrueAction3 = [!SetOption MeterRepeat ImageTint "#*Highlight*#"][!SetOption MeterRepeat ImageName "#@#repeat.png"]
DynamicVariables = 1

[MeterRepeat]
Meter = Image
X = ([MeterNext:X])+(30*#Scale#)
Y = ((200*#Scale#)-(18*#Scale#))/2
W = (18*#Scale#)
H = (18*#Scale#)
AntiAlias = 1
ImageTint = #Color#
LeftMouseDownAction = [!CommandMeasure MeasurePlayPause "Repeat"]
MouseOverAction = [!SetOption MeterRepeat ImageAlpha "127"]
MouseLeaveAction = [!SetOption MeterRepeat ImageAlpha "255"]
Group = Hover
DynamicVariables = 1

[MeasureShuffle]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Shuffle
PlayerId = #PlayerId#
IfCondition = MeasureShuffle = 0
IfTrueAction = [!SetOption MeterShuffle ImageTint "#*Color*#"]
IfCondition2 = MeasureShuffle = 1
IfTrueAction2 = [!SetOption MeterShuffle ImageTint "#*Highlight*#"]
DynamicVariables = 1

[MeterShuffle]
Meter = Image
ImageName = #@#shuffle.png
ImageTint = #Color#
X = ([MeterPrev:X])-(30*#Scale#)
Y = ((200*#Scale#)-(18*#Scale#))/2
W = (18*#Scale#)
H = (18*#Scale#)
AntiAlias = 1
LeftMouseUpAction = [!CommandMeasure MeasurePlayPause "Shuffle"]
MouseOverAction = [!SetOption MeterShuffle ImageAlpha "127"]
MouseLeaveAction = [!SetOption MeterShuffle ImageAlpha "255"]
Group = Hover
DynamicVariables = 1

[MeasureTitle]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Title
PlayerId = #PlayerId#
UpdateDivider = 10
DynamicVariables = 1

[MeterTitle]
Meter = String
X = (200*#Scale#)/2
Y = (60*#Scale#)
W = (100*#Scale#)
FontColor = #Color#
FontSize = (10*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
StringAlign = CenterTop
ClipString = 1
MeasureName = MeasureTitle
Group = Hover
DynamicVariables = 1

[MeasureArtist]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Artist
PlayerId = #PlayerId#
UpdateDivider = 10
DynamicVariables = 1

[MeterArtist]
Meter = String
X = (200*#Scale#)/2
Y = (121*#Scale#)
W = (100*#Scale#)
FontColor = #Color#
FontSize = (10*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
StringAlign = CenterTop
ClipString = 1
MeasureName = MeasureArtist
Group = Hover
DynamicVariables = 1

[MeasureProgress]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Progress
PlayerId = #PlayerId#
UpdateDivider = 10
DynamicVariables = 1

[MeterProgress]
Meter = Roundline
MeasureName = MeasureProgress
X = (100*#Scale#)
Y = (100*#Scale#)
StartAngle = 4.71238
RotationAngle = 6.28318
LineLength = (77*#Scale#)
LineStart = (75*#Scale#)
Solid = 1
AntiAlias = 1
LineColor = #Highlight#
DynamicVariables = 1

