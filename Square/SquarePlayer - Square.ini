[Metadata]
Name = SquarePlayer - Square
Author = Meti0X7CB
Information = "A sleek player widget for Win 11 to control all your media"
Version = 3.5
License = GNU General Public License v3.0

[RainMeter]
Update = 30
AccurateText = 1
OnRefreshAction = [!SetVariable Scale "[AppBar:MonitorScale()]"]

[Metadata]
Name=
Author=
Information=
License=
Version=

[Variables]
Scale = [AppBar:MonitorScale()]
Color = 222,222,222
SubColor = 170,170,170
Highlight = [WindowsAccentColor]
FrostLevel = Acrylic
Theme = Dark4
CornerType = RoundSmall 
PlayerId = "Active"

[WindowsAccentColor]
Measure = Plugin
Plugin = SysColor
ColorType = Accent

[AppBar]
Measure = Plugin
Plugin = AppBar
RequiredSpace = 0
DPIAware = 1
DynamicVariables = 1

[MeasureWindowsTheme]
Measure = Registry
RegHKey = HKEY_CURRENT_USER
RegKey = Software\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize
RegValue = AppsUseLightTheme
IfCondition = MeasureWindowsTheme = 1
IfConditionMode = 1
IfTrueAction = [!SetVariable Theme "Light4"][!SetVariable Color "28,28,28"][!SetVariable SubColor "105,105,105"]
IfFalseAction = [!SetVariable Theme "Dark4"][!SetVariable Color "222,222,222"][!SetVariable SubColor "170,170,170"]
OnChangeAction = [!Refresh]
DynamicVariables = 1

[MeasureWindowsScaling]
Measure = Calc
Formula = [AppBar:MonitorScale()]
OnChangeAction = [!SetVariable Scale "[AppBar:MonitorScale()]"][!Refresh]
DynamicVariables = 1
UpdateDivider = 10

[MeasureStatus]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Status
PlayerId = #PlayerId#
IfCondition = MeasureStatus = 1
IfTrueAction = [!ShowMeterGroup "Active"][!HideMeterGroup "Hover"][!ShowFade]
IfFalseAction = [!HideMeterGroup "Active"][!HideMeterGroup "Hover"][!HideFade]
DynamicVariables = 1

[MeasureCover]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Cover
PlayerId = #PlayerId#
DefaultPath = #@#Default.png
DynamicVariables = 1

[FrostedGlass]
Measure = Plugin
Plugin = FrostedGlass
Type = #FrostLevel#
Border = None
Corner = #CornerType#
Backdrop = #Theme#
BorderVisible = 0
DynamicVariables = 1

[MeterCanvas]
Meter = Shape
Shape = Rectangle 0,0,(200*#Scale#),(200*#Scale#),2*#Scale# | Fill Color 0,0,0,1 | StrokeWidth 0
DynamicVariables = 1

[MeterCoverContainer]
Meter = Shape
Shape = Rectangle 0,0,(190*#Scale#),(190*#Scale#),2*#Scale# | Fill Color 0,0,0,255 | StrokeWidth 0
X = (5*#Scale#)
Y = (5*#Scale#)
DynamicVariables = 1

[MeterCover]
Meter = Image
MeasureName = MeasureCover
H = (190*#Scale#)
W = (190*#Scale#)
Container = MeterCoverContainer
MouseOverAction = [!SetOption MeterCover ImageAlpha "127"][!ShowMeterGroup "Hover"]
MouseLeaveAction = [!SetOption MeterCover ImageAlpha "255"][!HideMeterGroup "Hover"]
PreserveAspectRatio = 2
DynamicVariables = 1
Group = Active

[MeasurePlayPause]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = State
PlayerId = #PlayerId#
Substitute = "0":"Play","1":"Pause","2":"Play","3":"Replay"
DynamicVariables = 1

[MeterPlayPause]
Meter = Image
ImageName = #@#[MeasurePlayPause].png
X = ((200*#Scale#)-(16*#Scale#))/2
Y = ((200*#Scale#)-(18*#Scale#))/2
W = (18*#Scale#)
H = (18*#Scale#)
AntiAlias = 1
DynamicVariables=1
ImageTint = #Color#
LeftMouseDownAction = [!CommandMeasure MeasurePlayPause "PlayPause"][!SetOption MeterPlayPause ImageTint "#*Highlight*#"]
LeftMouseUpAction = [!SetOption MeterPlayPause ImageTint "#*Color*#"]
MouseOverAction = [!SetOption MeterPlayPause ImageAlpha "127"]
MouseLeaveAction = [!SetOption MeterPlayPause ImageAlpha "255"][!SetOption MeterPlayPause ImageTint "#*Color*#"]
DynamicVariables = 1
Group = Hover

[MeterPrev]
Meter = Image
ImageName = #@#Previous.png
X = (60*#Scale#)
Y = ((200*#Scale#)-(18*#Scale#))/2
W = (18*#Scale#)
H = (18*#Scale#)
AntiAlias = 1
ImageTint = #Color#
LeftMouseDownAction = [!CommandMeasure MeasurePlayPause "Previous"][!SetOption MeterPrev ImageTint "#*Highlight*#"]
LeftMouseUpAction = [!SetOption MeterPrev ImageTint "#*Color*#"]
MouseOverAction = [!SetOption MeterPrev ImageAlpha "127"]
MouseLeaveAction = [!SetOption MeterPrev ImageAlpha "255"][!SetOption MeterPrev ImageTint "#*Color*#"]
DynamicVariables = 1
Group = Hover

[MeterNext]
Meter = Image
ImageName = #@#Next.png
X = (125*#Scale#)
Y = ((200*#Scale#)-(18*#Scale#))/2
W = (18*#Scale#)
H = (18*#Scale#)
AntiAlias = 1
ImageTint = #Color#
LeftMouseDownAction = [!CommandMeasure MeasurePlayPause "Next"][!SetOption MeterNext ImageTint "#*Highlight*#"]
LeftMouseUpAction = [!SetOption MeterNext ImageTint "#*Color*#"]
MouseOverAction = [!SetOption MeterNext ImageAlpha "127"]
MouseLeaveAction = [!SetOption MeterNext ImageAlpha "255"][!SetOption MeterNext ImageTint "#*Color*#"]
DynamicVariables = 1
Group = Hover

[MeasureRepeat]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Repeat
PlayerId = #PlayerId#
IfCondition = MeasureRepeat = 0
IfTrueAction = [!SetOption MeterRepeat ImageTint "#*Color*#"][!SetOption MeterRepeat ImageName "#@#repeat.png"]
IfCondition2 = MeasureRepeat = 1
IfTrueAction2 = [!SetOption MeterRepeat ImageTint "#*Highlight*#"][!SetOption MeterRepeat ImageName "#@#repeatOne.png"]
IfCondition3 = MeasureRepeat = 2
IfTrueAction3 = [!SetOption MeterRepeat ImageTint "#*Highlight*#"][!SetOption MeterRepeat ImageName "#@#repeat.png"]
DynamicVariables = 1

[MeterRepeat]
Meter = Image
X = (160*#Scale#)
Y = ((200*#Scale#)-(19*#Scale#))/2
W = (20*#Scale#)
H = (20*#Scale#)
AntiAlias = 1
ImageTint = #Color#
LeftMouseDownAction = [!CommandMeasure MeasurePlayPause "Repeat"]
MouseOverAction = [!SetOption MeterRepeat ImageAlpha "127"]
MouseLeaveAction = [!SetOption MeterRepeat ImageAlpha "255"]
DynamicVariables = 1
Group = Hover

[MeasureShuffle]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Shuffle
PlayerId = #PlayerId#
IfCondition = MeasureShuffle = 0
IfTrueAction = [!SetOption MeterShuffle ImageTint "#*Color*#"]
IfCondition2 = MeasureShuffle = 1
IfTrueAction2 = [!SetOption MeterShuffle ImageTint "#*Highlight*#"]
DynamicVariables = 1

[MeterShuffle]
Meter = Image
ImageName = #@#shuffle.png
ImageTint = #Color#
X = (20*#Scale#)
Y = ((200*#Scale#)-(19*#Scale#))/2
W = (20*#Scale#)
H = (20*#Scale#)
AntiAlias = 1
LeftMouseUpAction = [!CommandMeasure MeasurePlayPause "Shuffle"]
MouseOverAction = [!SetOption MeterShuffle ImageAlpha "127"]
MouseLeaveAction = [!SetOption MeterShuffle ImageAlpha "255"]
DynamicVariables = 1
Group = Hover

[MeasureTitle]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Title
PlayerId = #PlayerId#
DynamicVariables = 1
Substitute = "0":""

[MeterTitle]
Meter = String
MeasureName = MeasureTitle
X = (200*#Scale#)/2
Y = (120*#Scale#)
W = (150*#Scale#)
FontColor = #Color#
FontSize = (10*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
ClipString = 1
StringAlign = CenterTop
DynamicVariables = 1
Group = Hover

[MeasureArtist]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Artist
PlayerId = #PlayerId#
DynamicVariables = 1
Substitute = "0":""

[MeterArtist]
Meter = String
MeasureName = MeasureArtist
X = (200*#Scale#)/2
Y = (145*#Scale#)
W = (150*#Scale#)
FontColor = #Color#
FontSize = (10*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
ClipString = 1
StringAlign = CenterTop
DynamicVariables = 1
Group = Hover

[MeasureProgress]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Progress
PlayerId = #PlayerId#
DynamicVariables = 1

[MeasureProgressScaled]
Measure = Calc
Formula = Floor(([MeasureProgress:0]/100) * 189 + 0.5)
DynamicVariables = 1

[MeterProgressContainer]
Meter = Shape
Shape = Rectangle (5*#Scale#),(193*#Scale#),(190*#Scale#),(2*#Scale#),(2*#Scale#),(2*#Scale#)
AntiAlias = 1
DynamicVariables = 1
Group = Active

[MeterProgress]
Meter = Shape
Shape = Rectangle (5*#Scale#),(193*#Scale#),([MeasureProgressScaled:0]*#Scale#),(2*#Scale#),0,0| Fill Color #Highlight# | StrokeWidth 0
Shape2 = Rectangle ((5+[MeasureProgressScaled:0])*#Scale#),(193*#Scale#),((190-([MeasureProgressScaled:0]))*#Scale#),(2*#Scale#),0,0 | Fill Color #SubColor#,0 | StrokeWidth 0
Container = MeterProgressContainer
AntiAlias = 1
DynamicVariables = 1
Group = Active

[MeasurePosition]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Position
PlayerId = #PlayerId#
DynamicVariables = 1

[MeterPosition]
Meter = String
MeasureName = MeasurePosition
X = (15*#Scale#)
Y = (175*#Scale#)
FontColor = #Color#
FontSize = (7*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
StringAlign = LeftTop
DynamicVariables = 1
Group = Hover

[MeasureDuration]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Duration
PlayerId = #PlayerId#
DynamicVariables = 1

[MeterDuration]
Meter = String
MeasureName = MeasureDuration
X = (185*#Scale#)
Y = (175*#Scale#)
FontColor = #Color#
FontSize = (7*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
StringAlign = RightTop
DynamicVariables = 1
Group = Hover
